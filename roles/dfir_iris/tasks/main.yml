---
- name: Create DFIR-IRIS directory
  file:
    path: "{{ deploy_base_dir }}/dfir-iris"
    state: directory
    mode: '0755'

- name: Template DFIR-IRIS docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_base_dir }}/dfir-iris/docker-compose.yml"
    mode: '0644'

- name: Deploy DFIR-IRIS stack
  command:
    cmd: docker compose up -d
    chdir: "{{ deploy_base_dir }}/dfir-iris"

- name: Wait for DFIR-IRIS port to be ready
  wait_for:
    host: "{{ wazuh_server_ip }}"
    port: 4444
    timeout: 600
    delay: 15
  failed_when: false
