---
- name: Create FreeIPA directory
  file:
    path: "{{ deploy_base_dir }}/freeipa"
    state: directory
    mode: '0755'

- name: Template FreeIPA docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_base_dir }}/freeipa/docker-compose.yml"
    mode: '0644'

- name: Deploy FreeIPA
  command:
    cmd: docker compose up -d
    chdir: "{{ deploy_base_dir }}/freeipa"
  register: freeipa_deploy
  failed_when: >
    freeipa_deploy.rc != 0 and
    'AlreadyExists' not in (freeipa_deploy.stderr | default(''))

- name: Force-recreate FreeIPA if stale container state
  command:
    cmd: docker compose up -d --force-recreate
    chdir: "{{ deploy_base_dir }}/freeipa"
  when: "'AlreadyExists' in (freeipa_deploy.stderr | default(''))"

- name: Wait for FreeIPA web interface
  uri:
    url: "https://{{ lan_host_ip }}:8443/ipa/ui/"
    method: GET
    validate_certs: false
    status_code: 200
  register: freeipa_health
  until: freeipa_health.status == 200
  retries: 60
  delay: 15
  failed_when: false
