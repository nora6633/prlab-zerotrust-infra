---
- name: Create Shuffle directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ deploy_base_dir }}/shuffle"
    - "{{ deploy_base_dir }}/shuffle/apps"
    - "{{ deploy_base_dir }}/shuffle/files"

- name: Template Shuffle docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_base_dir }}/shuffle/docker-compose.yml"
    mode: '0644'

- name: Deploy Shuffle stack
  command:
    cmd: docker compose up -d
    chdir: "{{ deploy_base_dir }}/shuffle"

- name: Wait for Shuffle backend port to be ready
  wait_for:
    host: "{{ wazuh_server_ip }}"
    port: 5001
    timeout: 300
    delay: 10
