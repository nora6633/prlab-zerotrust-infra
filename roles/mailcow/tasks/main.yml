---
- name: Create Mailcow base directory
  file:
    path: "{{ deploy_base_dir }}/mailcow"
    state: directory
    mode: '0755'

- name: Clone mailcow-dockerized repository
  git:
    repo: https://github.com/mailcow/mailcow-dockerized.git
    dest: "{{ deploy_base_dir }}/mailcow/mailcow-dockerized"
    depth: 1
    force: false
    update: false

- name: Template mailcow.conf
  template:
    src: mailcow.conf.j2
    dest: "{{ deploy_base_dir }}/mailcow/mailcow-dockerized/mailcow.conf"
    mode: '0600'

- name: Template Mailcow docker-compose override (relaxed unbound healthcheck)
  template:
    src: docker-compose.override.yml.j2
    dest: "{{ deploy_base_dir }}/mailcow/mailcow-dockerized/docker-compose.override.yml"
    mode: '0644'

- name: Disable systemd-resolved stub listener (conflicts with Mailcow unbound on port 53)
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  register: resolved_conf

- name: Restart systemd-resolved to apply stub listener change
  systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_conf.changed

- name: Pull Mailcow images
  command:
    cmd: docker compose pull
    chdir: "{{ deploy_base_dir }}/mailcow/mailcow-dockerized"

- name: Deploy Mailcow stack
  command:
    cmd: docker compose up -d
    chdir: "{{ deploy_base_dir }}/mailcow/mailcow-dockerized"

- name: Wait for Mailcow web interface
  uri:
    url: "https://{{ lan_host_ip }}/api/v1/get/status/containers"
    method: GET
    validate_certs: false
    status_code: [200, 401]
  register: mailcow_health
  until: mailcow_health.status in [200, 401]
  retries: 30
  delay: 15
  failed_when: false
