[external]
external-host ansible_host=10.8.0.12 ansible_user=tommygood

# Windows DMZ alternative — comment out the Linux line above and use this
# instead, then run `ansible-playbook deploy_windows_dmz.yml` (NOT site.yml's
# external play, which assumes Linux). Store the password in Ansible Vault:
#
#   ansible-vault encrypt_string 'your-password' --name 'win_admin_password'
#   # → paste the resulting block into group_vars/external.yml
#
# dmz-windows ansible_host=10.8.0.17 ansible_user=Administrator ansible_password="{{ win_admin_password }}" ansible_connection=winrm ansible_winrm_transport=basic ansible_port=5985 ansible_winrm_server_cert_validation=ignore

[soc]
soc-host ansible_host=10.8.0.13 ansible_user=tommygood

[lan]
lan-host ansible_host=10.8.0.14 ansible_user=tommygood

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
